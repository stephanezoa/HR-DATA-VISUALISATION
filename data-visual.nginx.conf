server {
    listen 80;
    server_name data-visual.perenkap-api.online;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name data-visual.perenkap-api.online;

    # SSL Configuration (utilise le certificat wildcard existant)
    ssl_certificate /etc/letsencrypt/live/perenkap-api.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perenkap-api.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/data-visual-access.log;
    error_log /var/log/nginx/data-visual-error.log;

    # Max upload size (pour les fichiers Excel)
    client_max_body_size 50M;

    # Proxy vers Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts pour les rapports longs
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Servir les fichiers statiques directement
    location /static {
        alias /home/perenkap/HR-DATA-VISUALISATION/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
