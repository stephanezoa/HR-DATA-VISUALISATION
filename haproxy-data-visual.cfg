# Configuration HAProxy pour data-visual.perenkap-api.online
# À ajouter dans /etc/haproxy/haproxy.cfg

# ÉTAPE 1: Ajouter cette ligne dans la section "frontend https-in" (après ligne 56)
# Ajoutez ces 2 lignes après la ligne "acl is_maviance_subdomain..."

    acl is_datavisual_subdomain hdr(host) -i data-visual.perenkap-api.online
    use_backend datavisual_backend if is_datavisual_subdomain


# ÉTAPE 2: Ajouter ce backend à la fin du fichier (après ligne 90)

backend datavisual_backend
    mode http
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    timeout server 120000
    server datavisual1 127.0.0.1:5002 check
