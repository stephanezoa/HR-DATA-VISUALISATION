{% extends "base.html" %}
{% block title %}Erreur {{ code }}{% endblock %}
{% block content %}
  <section class="card error-card">
    <div class="error-code">{{ code }}</div>
    <p class="error-msg">{{ message }}</p>
    <a href="{{ url_for('index') }}" class="button button--primary">Retour à l'accueil</a>
  </section>
{% endblock %}
